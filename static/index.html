<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoGuide Agent</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <span class="brand-mark"></span>
            <div>
              <strong>AlgoGuide Agent</strong>
              <span>Chat workspace</span>
            </div>
          </div>
          <button class="new-chat" type="button" id="new-chat">+ New chat</button>
        </div>

        <div class="sidebar-group">
          <p class="sidebar-label">Recent chats</p>
          <div id="recent-chats" class="session-list" aria-live="polite"></div>
        </div>

        <div class="sidebar-group">
          <p class="sidebar-label">Knowledge base upload</p>
          <div class="kb-panel">
            <select id="knowledge-base-select" class="kb-select" aria-label="选择目标知识库"></select>
            <input
              id="knowledge-base-name"
              class="kb-name-input"
              type="text"
              placeholder="新知识库名称"
              hidden
            />
            <input
              id="knowledge-file"
              class="kb-file-input"
              type="file"
              accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <button type="button" class="kb-upload-button" id="knowledge-upload-btn">上传并预览</button>
          </div>

          <div id="knowledge-preview" class="knowledge-preview knowledge-preview-empty">
            上传 PDF 或 Word 文档后，会在这里看到摘要和切块预览。
          </div>
        </div>

        <div class="sidebar-group sidebar-bottom">
          <p class="sidebar-label">Shortcuts</p>
          <button type="button" class="sidebar-item" data-prompt="给我一个 C++ 版的动态规划例题。">C++ example</button>
          <button type="button" class="sidebar-item" data-prompt="把这个答案讲得更简单一点。">Simplify</button>
          <button type="button" class="sidebar-item" data-prompt="继续追问这道题的状态转移。">Follow up</button>
        </div>
      </aside>

      <section class="chat-panel">
        <header class="chat-topbar">
          <div class="chat-title">
            <p>AlgoGuide Agent</p>
            <h1>ChatGPT-style algorithm assistant</h1>
          </div>
          <div class="chat-badge">
            <span class="status-dot not-ready"></span>
            <span id="chat-badge-text">检查中</span>
          </div>
        </header>

        <div class="chat-body">
          <div class="chat-notice">
            <span>Knowledge retrieval enabled</span>
            <span>Multi-turn conversation</span>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>
        </div>

        <footer class="composer-wrap">
          <form id="chat-form" class="composer">
            <label class="sr-only" for="input">请输入问题</label>
            <textarea id="input" rows="1" placeholder="Message AlgoGuide..."></textarea>
            <div class="composer-row">
              <p class="helper-text">Enter to send, Shift + Enter for a new line</p>
              <button type="submit">Send</button>
            </div>
          </form>
        </footer>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
